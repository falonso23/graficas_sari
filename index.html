<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graficas Sari</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1/Sortable.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background-color: #F8F9FA;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .main-layout {
      width: 100%;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .main-left {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h1 {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: #C3B1E1;
      text-align: center;
    }

    .inputs-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #555;
    }

    .input-group input {
      width: 72px;
      padding: 0.45rem 0.5rem;
      border: 2px solid #A8E6CF;
      border-radius: 10px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    .input-group input:focus {
      border-color: #7dd4ac;
      box-shadow: 0 0 0 3px rgba(168, 230, 207, 0.35);
    }

    .chart-wrapper {
      flex: 1;
      min-width: 0;
      position: relative;
      background: #fff;
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    canvas {
      width: 100% !important;
      touch-action: none;
    }

    .btn-export {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.65rem 2rem;
      background-color: #C3B1E1;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.25s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-export:hover {
      background-color: #b09dd4;
      transform: translateY(-1px);
    }

    .btn-export:active {
      transform: translateY(0);
    }

    .btn-export.exported {
      background-color: #A8E6CF;
    }

    .btn-export-jpg {
      background-color: #A8E6CF !important;
    }

    .btn-export-jpg:hover {
      background-color: #8dd4b5 !important;
    }

    .export-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .chart-area {
      width: 100%;
      display: flex;
      align-items: stretch;
      gap: 0.5rem;
    }

    .y-range-controls {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1.5rem 0;
    }

    .y-range-controls .input-group {
      align-items: center;
    }

    .range-input {
      width: 64px !important;
      padding: 0.35rem 0.3rem !important;
      border-color: #C3B1E1 !important;
      font-size: 0.85rem !important;
    }

    .range-input:focus {
      border-color: #9B7FC4 !important;
      box-shadow: 0 0 0 3px rgba(195, 177, 225, 0.35) !important;
    }

    .y-range-controls label {
      color: #9B7FC4 !important;
      font-size: 0.75rem !important;
    }

    .zones-panel {
      width: 200px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 12px;
      padding: 0.75rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      align-self: flex-start;
    }

    .zones-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .zones-title {
      font-weight: 700;
      font-size: 0.85rem;
      color: #9B7FC4;
    }

    .btn-add-zone {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #A8E6CF;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-add-zone:hover {
      background-color: #8dd4b5;
    }

    .zones-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .zone-card {
      background: #f9f5ff;
      border-radius: 10px;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      border: 1px solid #ebe0f5;
    }

    .zone-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .zone-card-fields {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .zone-card-fields label {
      font-weight: 600;
      font-size: 0.65rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .zone-card-fields input[type="number"] {
      width: 52px;
      padding: 0.25rem;
      border: 1.5px solid #d4c6ef;
      border-radius: 6px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      text-align: center;
      outline: none;
      background: #fff;
    }

    .zone-card-fields input[type="number"]:focus {
      border-color: #9B7FC4;
    }

    .zone-color-pick {
      width: 26px;
      height: 26px;
      border: 2px solid #d4c6ef;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      background: none;
      flex-shrink: 0;
    }

    .btn-delete-zone {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      width: 22px;
      height: 22px;
      background-color: #f8a0a0;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-delete-zone:hover {
      background-color: #e57373;
    }

    .indices-config-panel {
      width: 100%;
      background: #fff;
      border-radius: 12px;
      padding: 0.6rem 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .indices-config-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    .index-config-chip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: #f0faf5;
      border: 1px solid #c8edd9;
      border-radius: 8px;
      padding: 0.25rem 0.4rem;
      transition: box-shadow 0.15s;
    }

    .index-config-chip.sortable-ghost {
      opacity: 0.4;
    }

    .index-config-chip.sortable-chosen {
      box-shadow: 0 2px 8px rgba(168, 230, 207, 0.5);
    }

    .drag-handle {
      cursor: grab;
      color: #A8E6CF;
      font-size: 0.8rem;
      user-select: none;
      line-height: 1;
      padding: 0 0.1rem;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .index-config-chip input[type="text"] {
      width: 42px;
      padding: 0.2rem;
      border: 1.5px solid #A8E6CF;
      border-radius: 5px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      text-align: center;
      outline: none;
      background: #fff;
      text-transform: uppercase;
    }

    .index-config-chip input[type="text"]:focus {
      border-color: #7dd4ac;
    }

    .btn-delete-index {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      width: 18px;
      height: 18px;
      background-color: #f8a0a0;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-delete-index:hover {
      background-color: #e57373;
    }

    /* Tablet */
    @media (max-width: 768px) {
      body { padding: 1.25rem 0.75rem; }

      .main-layout {
        flex-direction: column;
      }

      .zones-panel {
        width: 100%;
        flex-direction: row;
      }

      .zones-list {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .zone-card {
        flex: 1 1 140px;
        min-width: 140px;
      }

      .chart-wrapper {
        padding: 0.75rem 0.5rem;
      }
    }

    /* Mobile */
    @media (max-width: 520px) {
      body { padding: 1rem 0.5rem; }

      .container { gap: 1rem; }

      h1 { font-size: 1.4rem; }

      .indices-config-panel {
        padding: 0.5rem 0.6rem;
      }

      .indices-config-list {
        gap: 0.3rem;
      }

      .index-config-chip input[type="text"] {
        width: 38px;
        font-size: 0.7rem;
      }

      .inputs-row {
        gap: 0.4rem;
      }

      .input-group label {
        font-size: 0.75rem;
      }

      .input-group input {
        width: 56px;
        font-size: 0.85rem;
        padding: 0.35rem 0.3rem;
      }

      .chart-area {
        flex-direction: column-reverse;
      }

      .y-range-controls {
        flex-direction: row;
        justify-content: center;
        gap: 1rem;
        padding: 0;
      }

      .range-input {
        width: 56px !important;
      }

      .chart-wrapper {
        padding: 0.5rem 0.25rem;
      }

      .export-buttons {
        flex-direction: column;
        align-items: stretch;
        gap: 0.6rem;
      }

      .btn-export {
        width: 100%;
        padding: 0.75rem 1rem;
      }

      .zones-panel {
        width: 100%;
        padding: 0.6rem;
      }

      .zone-card-fields input[type="number"] {
        width: 48px;
        font-size: 0.75rem;
      }
    }

    /* Very small screens */
    @media (max-width: 360px) {
      h1 { font-size: 1.2rem; }

      .input-group input {
        width: 48px;
        font-size: 0.8rem;
      }

      .range-input {
        width: 48px !important;
      }

      .index-config-chip input[type="text"] {
        width: 34px;
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Graficas Sari</h1>

    <div class="indices-config-panel">
      <div class="zones-header">
        <span class="zones-title">Indices</span>
        <button class="btn-add-zone" id="btnAddIndex">+</button>
      </div>
      <div id="indicesList" class="indices-config-list"></div>
    </div>

    <div id="indicesValues" class="inputs-row"></div>

    <div class="main-layout">
      <div class="main-left">
        <div class="chart-area">
          <div class="y-range-controls">
            <div class="input-group">
              <label for="inp-ymax">Max</label>
              <input type="number" id="inp-ymax" value="160" step="5" class="range-input">
            </div>
            <div class="input-group">
              <label for="inp-ystep">Int</label>
              <input type="number" id="inp-ystep" value="10" step="1" min="1" class="range-input">
            </div>
            <div class="input-group">
              <label for="inp-ymin">Min</label>
              <input type="number" id="inp-ymin" value="40" step="5" class="range-input">
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="wiscChart"></canvas>
          </div>
        </div>
        <div class="export-buttons">
          <button class="btn-export" id="btnExportPng">Exportar PNG</button>
          <button class="btn-export btn-export-jpg" id="btnExportJpg">Exportar JPG</button>
        </div>
      </div>

      <div class="zones-panel">
        <div class="zones-header">
          <span class="zones-title">Zonas</span>
          <button class="btn-add-zone" id="btnAddZone">+</button>
        </div>
        <div id="zonesList" class="zones-list"></div>
      </div>
    </div>
  </div>

  <script>
    // --- Register annotation plugin ---
    Chart.register(window['chartjs-plugin-annotation'] || ChartAnnotation);

    // --- Dynamic indices ---
    let indices = [
      { name: 'ICV', value: 100 },
      { name: 'IVE', value: 100 },
      { name: 'IRF', value: 100 },
      { name: 'IMT', value: 100 },
      { name: 'IVP', value: 100 },
      { name: 'CIT', value: 100 }
    ];

    let yMin = 40;
    let yMax = 160;
    let yStep = 10;
    const inpYMin = document.getElementById('inp-ymin');
    const inpYMax = document.getElementById('inp-ymax');
    const inpYStep = document.getElementById('inp-ystep');

    function clamp(v) {
      return Math.max(yMin, Math.min(yMax, Math.round(v)));
    }

    // --- Zones management ---
    let zones = [
      { id: 1, min: 40, max: 75, color: '#A8E6CF' },
      { id: 2, min: 125, max: 160, color: '#A8E6CF' }
    ];
    let nextZoneId = 3;

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function rebuildAnnotations() {
      const annotations = {
        lineMean: {
          type: 'line',
          yMin: 100,
          yMax: 100,
          borderColor: '#999999',
          borderWidth: 1.5,
          borderDash: [10, 6]
        }
      };
      zones.forEach(function(z) {
        annotations['zone_' + z.id] = {
          type: 'box',
          yMin: z.min,
          yMax: z.max,
          backgroundColor: hexToRgba(z.color, 0.5),
          borderWidth: 0,
          drawTime: 'beforeDatasetsDraw'
        };
      });
      chart.options.plugins.annotation.annotations = annotations;
      chart.update();
    }

    function renderZonesList() {
      const container = document.getElementById('zonesList');
      container.innerHTML = '';
      zones.forEach(function(z) {
        const card = document.createElement('div');
        card.className = 'zone-card';
        card.innerHTML =
          '<div class="zone-card-header">' +
            '<input type="color" class="zone-color-pick" value="' + z.color + '" data-zone-id="' + z.id + '" data-field="color">' +
            '<button class="btn-delete-zone" data-zone-id="' + z.id + '">x</button>' +
          '</div>' +
          '<div class="zone-card-fields">' +
            '<label>Min</label>' +
            '<input type="number" value="' + z.min + '" data-zone-id="' + z.id + '" data-field="min">' +
            '<label>Max</label>' +
            '<input type="number" value="' + z.max + '" data-zone-id="' + z.id + '" data-field="max">' +
          '</div>';
        container.appendChild(card);
      });

      container.querySelectorAll('input[data-field="min"], input[data-field="max"]').forEach(function(inp) {
        inp.addEventListener('change', function() {
          const id = parseInt(this.dataset.zoneId, 10);
          const field = this.dataset.field;
          const val = parseInt(this.value, 10);
          if (isNaN(val)) return;
          const zone = zones.find(function(z) { return z.id === id; });
          if (zone) { zone[field] = val; rebuildAnnotations(); }
        });
      });

      container.querySelectorAll('input[data-field="color"]').forEach(function(inp) {
        inp.addEventListener('input', function() {
          const id = parseInt(this.dataset.zoneId, 10);
          const zone = zones.find(function(z) { return z.id === id; });
          if (zone) { zone.color = this.value; rebuildAnnotations(); }
        });
      });

      container.querySelectorAll('.btn-delete-zone').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const id = parseInt(this.dataset.zoneId, 10);
          zones = zones.filter(function(z) { return z.id !== id; });
          renderZonesList();
          rebuildAnnotations();
        });
      });
    }

    document.getElementById('btnAddZone').addEventListener('click', function() {
      zones.push({ id: nextZoneId++, min: 40, max: 75, color: '#A8E6CF' });
      renderZonesList();
      rebuildAnnotations();
    });

    // --- Indices config rendering ---
    let sortableInstance = null;

    function renderIndicesConfig() {
      const container = document.getElementById('indicesList');
      container.innerHTML = '';
      indices.forEach(function(idx, i) {
        const chip = document.createElement('div');
        chip.className = 'index-config-chip';
        chip.dataset.idx = i;
        chip.innerHTML =
          '<span class="drag-handle">&#9776;</span>' +
          '<input type="text" value="' + idx.name + '" data-idx="' + i + '">' +
          '<button class="btn-delete-index" data-idx="' + i + '">x</button>';
        container.appendChild(chip);
      });

      container.querySelectorAll('input[type="text"]').forEach(function(inp) {
        inp.addEventListener('change', function() {
          const i = parseInt(this.dataset.idx, 10);
          const val = this.value.trim().toUpperCase();
          if (!val) { this.value = indices[i].name; return; }
          indices[i].name = val;
          rebuildChart();
        });
      });

      container.querySelectorAll('.btn-delete-index').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const i = parseInt(this.dataset.idx, 10);
          if (indices.length <= 2) return;
          indices.splice(i, 1);
          rebuildChart();
        });
      });

      if (sortableInstance) sortableInstance.destroy();
      sortableInstance = new Sortable(container, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: function(evt) {
          var item = indices.splice(evt.oldIndex, 1)[0];
          indices.splice(evt.newIndex, 0, item);
          rebuildChart();
        }
      });
    }

    document.getElementById('btnAddIndex').addEventListener('click', function() {
      indices.push({ name: 'NEW', value: 100 });
      rebuildChart();
    });

    // --- Value inputs rendering ---
    function renderValueInputs() {
      const container = document.getElementById('indicesValues');
      container.innerHTML = '';
      indices.forEach(function(idx, i) {
        const group = document.createElement('div');
        group.className = 'input-group';
        group.innerHTML =
          '<label>' + idx.name + '</label>' +
          '<input type="number" min="' + yMin + '" max="' + yMax + '" value="' + idx.value + '" data-idx="' + i + '">';
        container.appendChild(group);
      });

      container.querySelectorAll('input[type="number"]').forEach(function(inp) {
        inp.addEventListener('input', function() {
          const i = parseInt(this.dataset.idx, 10);
          const raw = this.value;
          if (raw === '' || isNaN(raw)) return;
          const v = clamp(parseInt(raw, 10));
          indices[i].value = v;
          chart.data.datasets[0].data[i] = v;
          chart.update('none');
        });

        inp.addEventListener('change', function() {
          const i = parseInt(this.dataset.idx, 10);
          const raw = this.value;
          if (raw === '' || isNaN(raw)) {
            this.value = indices[i].value;
            return;
          }
          const v = clamp(parseInt(raw, 10));
          this.value = v;
          indices[i].value = v;
          chart.data.datasets[0].data[i] = v;
          chart.update('none');
        });
      });
    }

    function updateYRange() {
      const newMin = parseInt(inpYMin.value, 10);
      const newMax = parseInt(inpYMax.value, 10);
      const newStep = parseInt(inpYStep.value, 10);
      if (isNaN(newMin) || isNaN(newMax) || newMin >= newMax) return;
      if (!isNaN(newStep) && newStep >= 1) yStep = newStep;
      yMin = newMin;
      yMax = newMax;

      chart.options.scales.y.min = yMin;
      chart.options.scales.y.max = yMax;
      chart.options.scales.y.ticks.stepSize = yStep / 2;
      chart.options.scales.y.ticks.color = function(context) {
        return context.tick.value % yStep === 0 ? '#555' : 'transparent';
      };
      chart.options.scales.y.ticks.callback = function(value) {
        return value % yStep === 0 ? value : '';
      };
      chart.options.scales.y.grid.color = function(context) {
        if (context.tick && context.tick.value === 100) return 'transparent';
        if (context.tick && context.tick.value % yStep === 0) return 'rgba(0,0,0,0.12)';
        return 'rgba(0,0,0,0.04)';
      };
      chart.options.scales.y.grid.lineWidth = function(context) {
        if (context.tick && context.tick.value === 100) return 0;
        if (context.tick && context.tick.value % yStep === 0) return 1;
        return 0.5;
      };

      indices.forEach(function(idx) { idx.value = clamp(idx.value); });
      renderValueInputs();
      rebuildAnnotations();
    }

    // --- Chart ---
    const ctx = document.getElementById('wiscChart').getContext('2d');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: indices.map(function(idx) { return idx.name; }),
        datasets: [{
          label: 'Puntuacion',
          data: indices.map(function(idx) { return idx.value; }),
          tension: 0.4,
          borderColor: '#9B7FC4',
          borderWidth: 2.5,
          pointBackgroundColor: '#C3B1E1',
          pointBorderColor: '#9B7FC4',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6,
          pointHitRadius: 12,
          fill: false,
          dragData: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        animation: { duration: 200 },
        layout: {
          padding: { top: 10, right: 15, bottom: 5, left: 10 }
        },
        scales: {
          y: {
            min: 40,
            max: 160,
            ticks: {
              stepSize: 5,
              font: { family: 'Quicksand', weight: '600', size: 11 },
              color: function(context) {
                return context.tick.value % 10 === 0 ? '#555' : 'transparent';
              },
              callback: function(value) {
                return value % 10 === 0 ? value : '';
              }
            },
            grid: {
              color: function(context) {
                if (context.tick && context.tick.value === 100) return 'transparent';
                if (context.tick && context.tick.value % 10 === 0) return 'rgba(0,0,0,0.12)';
                return 'rgba(0,0,0,0.04)';
              },
              lineWidth: function(context) {
                if (context.tick && context.tick.value === 100) return 0;
                if (context.tick && context.tick.value % 10 === 0) return 1;
                return 0.5;
              }
            },
            border: { display: true, color: '#ccc' }
          },
          x: {
            ticks: {
              font: { family: 'Quicksand', weight: '700', size: 13 },
              color: '#555'
            },
            grid: {
              color: 'rgba(0,0,0,0.05)',
              lineWidth: 0.5
            },
            border: { display: true, color: '#ccc' }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(155, 127, 196, 0.9)',
            titleFont: { family: 'Quicksand', weight: '600' },
            bodyFont: { family: 'Quicksand', weight: '500' },
            cornerRadius: 8,
            padding: 10,
            callbacks: {
              label: function(ctx) {
                return ctx.parsed.y;
              }
            }
          },
          annotation: {
            annotations: {}
          },
          dragData: {
            round: 0,
            dragX: false,
            showTooltip: true,
            onDragStart: function(e, datasetIndex, index, value) {
              e.target.style.cursor = 'grabbing';
            },
            onDrag: function(e, datasetIndex, index, value) {
              e.target.style.cursor = 'grabbing';
              return clamp(value);
            },
            onDragEnd: function(e, datasetIndex, index, value) {
              e.target.style.cursor = 'default';
              const clamped = clamp(value);
              indices[index].value = clamped;
              chart.data.datasets[0].data[index] = clamped;
              renderValueInputs();
              chart.update('none');
            }
          }
        },
        onHover: function(event, elements) {
          event.native.target.style.cursor = elements.length ? 'grab' : 'default';
        }
      }
    });

    function rebuildChart() {
      chart.data.labels = indices.map(function(idx) { return idx.name; });
      chart.data.datasets[0].data = indices.map(function(idx) { return idx.value; });
      chart.update();
      renderValueInputs();
      renderIndicesConfig();
      rebuildAnnotations();
    }

    // --- Initialize ---
    renderIndicesConfig();
    renderValueInputs();
    renderZonesList();
    rebuildAnnotations();

    // --- Y range listeners ---
    inpYMin.addEventListener('change', updateYRange);
    inpYMax.addEventListener('change', updateYRange);
    inpYStep.addEventListener('change', updateYRange);

    // --- Export helpers ---
    function exportFeedback(btn, originalText) {
      btn.classList.add('exported');
      btn.textContent = '¡Descargado!';
      setTimeout(function() {
        btn.classList.remove('exported');
        btn.textContent = originalText;
      }, 1200);
    }

    function downloadImage(url, filename) {
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // --- PNG export (transparent background) ---
    document.getElementById('btnExportPng').addEventListener('click', function() {
      const url = chart.toBase64Image('image/png');
      downloadImage(url, 'perfil-wisc-v.png');
      exportFeedback(this, 'Exportar PNG');
    });

    // --- JPG export (white background) ---
    document.getElementById('btnExportJpg').addEventListener('click', function() {
      const canvas = chart.canvas;
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.fillStyle = '#ffffff';
      tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
      tempCtx.drawImage(canvas, 0, 0);
      const url = tempCanvas.toDataURL('image/jpeg', 0.95);
      downloadImage(url, 'perfil-wisc-v.jpg');
      exportFeedback(this, 'Exportar JPG');
    });
  </script>
</body>
</html>
